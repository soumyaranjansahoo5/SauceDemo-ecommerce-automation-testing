# ============================================================
# E-Commerce Automation Framework - Configuration
# ============================================================

# Application URL (using a real public demo e-commerce site)
base.url=https://www.saucedemo.com
api.base.url=https://fakestoreapi.com

# Browser (chrome / firefox / edge)
browser=chrome
headless=false

# Timeouts (seconds)
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# Test Credentials
valid.username=standard_user
valid.password=secret_sauce
locked.username=locked_out_user
invalid.username=wrong_user
invalid.password=wrong_pass

# Reporting
report.path=test-output/ExtentReport.html
screenshot.path=test-output/screenshots/
